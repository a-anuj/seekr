name: Build and Push to Fedora COPR

on:
  release:
    types: [published]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install RPM and COPR Build Tools
        run: dnf install -y rpm-build rpmdevtools copr-cli

      - name: Extract Version from Spec
        id: spec-info
        run: |
          VERSION=$(grep '^Version:' seekr.spec | awk '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version detected: $VERSION"

      - name: Package Tarball
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          # Build the package structure in /tmp to avoid circular 'cp' errors
          PKG_DIR="/tmp/seekr-pkg/seekr-${VERSION}"
          mkdir -p "$PKG_DIR"
          cp -r . "$PKG_DIR/"
          # Remove GitHub metadata from the package
          rm -rf "$PKG_DIR/.git" "$PKG_DIR/.github"
          # Create the tarball from the /tmp directory
          tar -C /tmp/seekr-pkg -czvf ~/rpmbuild/SOURCES/seekr-${VERSION}.tar.gz seekr-${VERSION}
      
      - name: Copy Spec File
        run: cp seekr.spec ~/rpmbuild/SPECS/

      - name: Build SRPM (Source RPM)
        run: rpmbuild -bs ~/rpmbuild/SPECS/seekr.spec

      - name: Authenticate with COPR
        run: |
          mkdir -p ~/.config
          # The COPR config content comes securely from GitHub Secrets
          echo "${{ secrets.COPR_CONFIG }}" > ~/.config/copr

      - name: Trigger COPR Build
        run: |
          copr-cli build a-anuj/seekr ~/rpmbuild/SRPMS/*.src.rpm
          echo "✅ Build successfully submitted to COPR!"
